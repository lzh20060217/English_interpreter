<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 智能同传助手</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
:root{color-scheme:light}.dark{color-scheme:dark}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.animate-pulse{animation:pulse 1.5s infinite}
.rec-dot{width:8px;height:8px;border-radius:50%;background:#ef4444;display:inline-block;animation:pulse 1s infinite}
.scrollbar-thin::-webkit-scrollbar{width:5px}
.scrollbar-thin::-webkit-scrollbar-thumb{background:#a1a1aa;border-radius:3px}
.dark .scrollbar-thin::-webkit-scrollbar-thumb{background:#3f3f46}
</style>
</head>
<body class="antialiased bg-zinc-100 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100"><div id="app"></div>
<script>
// ===== STATE =====
const S={theme:'dark',status:'idle',sourceLang:'zh',targetLang:'zh',error:null}
function st(s){switch(s){case'idle':return'就绪';case'requesting':return'请求权限...';case'recording':return'正在录音...';case'paused':return'已暂停';case'stopped':return'已停止';case'error':return S.error||'错误';default:return''}}
function $(id){return document.getElementById(id)}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function ts(){const d=new Date();return d.toTimeString().slice(0,8)}
function hideEmpty(id){const e=$(id);if(e)e.style.display='none'}
function upCnt(id,n){const e=$(id);if(e)e.textContent=n+' 条'}
let cnt={tp:0,trp:0,pp:0,np:0}

// ===== RENDER (structural only) =====
function render(){
  const d=S.theme==='dark';const rec=S.status==='recording';const pau=S.status==='paused'
  document.body.className=(d?'dark ':'')+'antialiased bg-zinc-100 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100'
  document.getElementById('app').innerHTML=`<div class="flex flex-col h-screen w-full overflow-hidden">
<div class="border-b px-6 py-3 flex flex-col gap-2 bg-white dark:bg-zinc-950 border-zinc-200 dark:border-zinc-800">
  <div class="flex items-center justify-between gap-4 flex-wrap">
    <div class="flex items-center gap-2">
      <div class="p-2 rounded-lg bg-cyan-50 dark:bg-cyan-950/50 text-cyan-600 dark:text-cyan-400">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
      </div>
      <h1 class="text-lg font-bold">AI 智能同传助手</h1>
    </div>
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-2">
        <select id="sl" class="px-3 py-1.5 rounded-lg text-sm border bg-zinc-50 dark:bg-zinc-900 border-zinc-300 dark:border-zinc-700">
          <option value="auto"${S.sourceLang==='auto'?' selected':''}>自动识别</option>
          <option value="zh"${S.sourceLang==='zh'?' selected':''}>中文</option>
          <option value="en"${S.sourceLang==='en'?' selected':''}>English</option>
          <option value="ja"${S.sourceLang==='ja'?' selected':''}>日本語</option>
        </select>
        <span class="text-zinc-400">→</span>
        <select id="tl" class="px-3 py-1.5 rounded-lg text-sm border bg-zinc-50 dark:bg-zinc-900 border-zinc-300 dark:border-zinc-700">
          <option value="zh"${S.targetLang==='zh'?' selected':''}>中文</option>
          <option value="en"${S.targetLang==='en'?' selected':''}>English</option>
          <option value="ja"${S.targetLang==='ja'?' selected':''}>日本語</option>
          <option value="ko"${S.targetLang==='ko'?' selected':''}>한국어</option>
        </select>
      </div>
      <div class="h-7 w-px bg-zinc-300 dark:bg-zinc-700"></div>
      <div class="flex items-center gap-2">
        <button id="br" class="flex items-center gap-2 px-4 py-1.5 rounded-lg text-sm font-medium transition-all ${rec?'bg-amber-500 hover:bg-amber-600 text-white':'bg-cyan-600 hover:bg-cyan-700 text-white'}">
          ${rec?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>暂停':pau?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>继续':'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>开始录音'}
        </button>
        ${(rec||pau)?'<button id="bs" class="flex items-center gap-2 px-4 py-1.5 rounded-lg text-sm font-medium bg-zinc-600 hover:bg-zinc-700 text-white"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>停止</button>':''}
      </div>
      ${rec?'<div class="flex items-center gap-2"><div class="w-20 h-2 bg-zinc-700 rounded-full overflow-hidden"><div id="lv" class="h-full rounded-full" style="width:3%;background:#22c55e"></div></div><span id="lp" class="text-xs font-mono w-7 text-right text-zinc-400">0%</span></div>':''}
      <div class="h-7 w-px bg-zinc-300 dark:bg-zinc-700"></div>
      <div class="flex items-center gap-1">
        <button id="bd" class="px-2 py-1.5 rounded-lg text-xs hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-500">演示数据</button>
        <button id="bc" class="px-2 py-1.5 rounded-lg text-xs hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-500">清空</button>
        <button id="bt" class="p-1.5 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800 text-zinc-500">${d?'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>':'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'}
        </button>
      </div>
    </div>
  </div>
  <div class="flex items-center gap-3 text-xs text-zinc-500">
    <span class="${S.status==='error'?'text-red-400':S.status==='recording'?'text-amber-400':''}">${rec?'<span class="rec-dot mr-1"></span>':''}${st(S.status)}</span>
    ${S.error?('<span class="text-red-400">'+esc(S.error)+'</span>'):''}
  </div>
</div>
<div class="flex-1 flex overflow-hidden min-h-0">
  <div class="flex-1 min-w-0 border-r border-zinc-200 dark:border-zinc-700 flex flex-col">
    <div class="px-4 py-2.5 border-b flex items-center justify-between bg-white dark:bg-zinc-950 border-zinc-200 dark:border-zinc-800 shrink-0">

      <span class="text-xs px-2 py-0.5 rounded-full bg-zinc-200 dark:bg-zinc-800 text-zinc-500" id="tc">0 条</span>
    </div>

  </div>
  <div class="flex-1 min-w-0 border-r border-zinc-200 dark:border-zinc-700 flex flex-col">
    <div class="px-4 py-2.5 border-b flex items-center justify-between bg-white dark:bg-zinc-950 border-zinc-200 dark:border-zinc-800 shrink-0">
      <div class="flex items-center gap-2"><div class="p-1 rounded bg-purple-50 dark:bg-purple-950/50 text-purple-600 dark:text-purple-400"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg></div><h3 class="text-sm font-semibold">翻译文本</h3></div>
      <span class="text-xs px-2 py-0.5 rounded-full bg-zinc-200 dark:bg-zinc-800 text-zinc-500" id="trc">0 条</span>
    </div>
    <div class="flex-1 overflow-y-auto p-3 space-y-2 scrollbar-thin" id="trp"><div class="h-full flex items-center justify-center text-zinc-400 text-sm" id="tre">翻译结果将显示在这里</div></div>
  </div>
  <div class="flex-1 min-w-0 border-r border-zinc-200 dark:border-zinc-700 flex flex-col">
    <div class="px-4 py-2.5 border-b flex items-center justify-between bg-white dark:bg-zinc-950 border-zinc-200 dark:border-zinc-800 shrink-0">
      <div class="flex items-center gap-2"><div class="p-1 rounded bg-emerald-50 dark:bg-emerald-950/50 text-emerald-600 dark:text-emerald-400"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div><h3 class="text-sm font-semibold">原语重述</h3></div>
      <span class="text-xs px-2 py-0.5 rounded-full bg-zinc-200 dark:bg-zinc-800 text-zinc-500" id="pc">0 条</span>
    </div>
    <div class="flex-1 overflow-y-auto p-3 space-y-2 scrollbar-thin" id="pp"><div class="h-full flex items-center justify-center text-zinc-400 text-sm" id="pe">同语言简化重述<br><span class="text-xs text-zinc-500">将源语言内容用更简单的表达方式重述</span></div></div>
  </div>
  <div class="flex-1 min-w-0 flex flex-col">
    <div class="px-4 py-2.5 border-b flex items-center justify-between bg-white dark:bg-zinc-950 border-zinc-200 dark:border-zinc-800 shrink-0">
      <div class="flex items-center gap-2"><div class="p-1 rounded bg-amber-50 dark:bg-amber-950/50 text-amber-600 dark:text-amber-400"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div><h3 class="text-sm font-semibold">口译笔记</h3></div>
      <span class="text-xs px-2 py-0.5 rounded-full bg-zinc-200 dark:bg-zinc-800 text-zinc-500" id="nc">0 条</span>
    </div>
    <div class="flex-1 overflow-y-auto p-3 space-y-2 scrollbar-thin" id="np"><div class="h-full flex items-center justify-center text-zinc-400 text-sm" id="ne">AI 将自动提取关键信息</div></div>
  </div>
</div>
</div>`
  bind()
  if(S.status==='recording')ensureInterim()
}

// ===== DIRECT DOM =====
function ensureInterim(){
  if($('il'))return
  hideEmpty('te')
  const p=$('tp');if(!p)return
  const el=document.createElement('div');el.id='il'
  el.className='p-3 rounded-lg border bg-blue-50 dark:bg-blue-950/20 border-blue-100 dark:border-blue-900/30'
  el.innerHTML='<div class="flex items-start justify-between gap-2"><p class="text-sm leading-relaxed text-zinc-900 dark:text-zinc-100" id="it"></p><span class="shrink-0 text-xs text-blue-500 animate-pulse">...</span></div><div class="mt-1 text-xs opacity-50 text-zinc-500" id="its"></div>'
  p.appendChild(el)
}
function updInterim(t){const e=$('it');if(e)e.textContent=t;const s=$('its');if(s)s.textContent=ts()}
function rmInterim(){const e=$('il');if(e)e.remove()}

function addTranscription(text,final){
  hideEmpty('te');if(final)rmInterim()
  const p=$('tp');if(!p)return
  const dark=S.theme==='dark'
  const bc=final?(dark?'bg-zinc-800/50 border-zinc-700':'bg-white border-zinc-200'):(dark?'bg-blue-950/20 border-blue-900/30':'bg-blue-50 border-blue-100')
  const d=document.createElement('div')
  d.className='p-3 rounded-lg border '+bc
  d.innerHTML='<div class="flex items-start justify-between gap-2"><p class="text-sm leading-relaxed text-zinc-900 dark:text-zinc-100">'+esc(text)+'</p>'+(final?'':'<span class="shrink-0 text-xs text-blue-500 animate-pulse">...</span>')+'</div><div class="mt-1 text-xs opacity-50 text-zinc-500">'+ts()+'</div>'
  p.appendChild(d);p.scrollTop=p.scrollHeight;cnt.tp++
  upCnt('tc',cnt.tp)
}

function addTranslation(text){
  hideEmpty('tre')
  const p=$('trp');if(!p)return
  const d=document.createElement('div')
  d.className='p-3 rounded-lg border bg-white dark:bg-zinc-800/50 border-zinc-200 dark:border-zinc-700'
  d.innerHTML='<p class="text-sm leading-relaxed text-zinc-900 dark:text-zinc-100">'+esc(text)+'</p><div class="mt-1 text-xs opacity-50 text-zinc-500">'+ts()+'</div>'
  p.appendChild(d);p.scrollTop=p.scrollHeight;cnt.trp++
  upCnt('trc',cnt.trp)
}

function addParaphrase(orig,simp){
  hideEmpty('pe')
  const p=$('pp');if(!p)return
  const d=document.createElement('div')
  d.className='p-3 rounded-lg border space-y-2 bg-white dark:bg-zinc-800/50 border-zinc-200 dark:border-zinc-700'
  d.innerHTML='<div><div class="text-xs font-medium mb-1 text-zinc-400 dark:text-zinc-500">原文</div><p class="text-sm leading-relaxed text-zinc-600 dark:text-zinc-300">'+esc(orig)+'</p></div><div class="h-px bg-zinc-200 dark:bg-zinc-700"></div><div><div class="text-xs font-medium mb-1 text-emerald-500">简化重述</div><p class="text-sm leading-relaxed font-medium text-zinc-900 dark:text-zinc-100">'+esc(simp)+'</p></div><div class="text-xs text-zinc-400 dark:text-zinc-600">'+ts()+'</div>'
  p.appendChild(d);p.scrollTop=p.scrollHeight;cnt.pp++
  upCnt('pc',cnt.pp)
}

function addNote(content){
  if(!content)return
  hideEmpty('ne')
  const p=$('np');if(!p)return
  const d=document.createElement('div')
  d.className='p-4 rounded-lg border bg-white dark:bg-zinc-800/50 border-zinc-200 dark:border-zinc-700'
  d.innerHTML='<pre class="text-base leading-relaxed whitespace-pre-wrap font-mono text-zinc-800 dark:text-zinc-200">'+esc(content)+'</pre>'
  p.appendChild(d);p.scrollTop=p.scrollHeight;cnt.np++
  upCnt('nc',cnt.np)
}

function clearPanels(){
  ['tp','trp','pp','np'].forEach(id=>{
    const p=$(id);if(!p)return
    const kids=p.children;for(let i=kids.length-1;i>=0;i--){const k=kids[i];if(k.id!=='te'&&k.id!=='tre'&&k.id!=='pe'&&k.id!=='ne')k.remove()}
  })
  ;['tc','trc','pc','nc'].forEach(id=>{const e=$(id);if(e)e.textContent='0 条'})
  cnt={tp:0,trp:0,pp:0,np:0};rmInterim()
}

// ===== SPEECH RECOGNITION =====
let rec=null;let pending='';let rtimer=null

function startSpeechRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition
  if(!SR){S.error='请使用 Chrome 浏览器';render();return}
  const r=new SR();r.continuous=true;r.interimResults=true
  const langCode=S.sourceLang==='zh'?'zh-CN':S.sourceLang==='en'?'en-US':S.sourceLang==='ja'?'ja-JP':'zh-CN'
  r.lang=langCode;r.maxAlternatives=1;pending=''
  r.onresult=function(ev){
    let inter='',fin=''
    for(let i=ev.resultIndex;i<ev.results.length;i++){
      if(ev.results[i].isFinal){fin+=ev.results[i][0].transcript;pending+=ev.results[i][0].transcript}
      else{inter+=ev.results[i][0].transcript}
    }
    if(inter){ensureInterim();updInterim(inter)}
    if(fin.trim()){
      rmInterim();const t=fin.trim()
      addTranscription(t,true)
      addParaphrase(t,simplify(t))
      fetchTranslation(t)
      const n=extractNote(t);if(n)addNote(n)
    }
  }
  r.onerror=function(ev){if(ev.error!=='no-speech'&&ev.error!=='aborted'){S.error='语音: '+ev.error;render()}}
  r.onend=function(){if(S.status==='recording'&&!rtimer){rtimer=setTimeout(()=>{rtimer=null;startSpeechRec()},200)}}
  rec=r;try{r.start()}catch(e){}
}

function stopSpeechRec(){
  if(rtimer){clearTimeout(rtimer);rtimer=null}
  if(rec){try{rec.onend=null;rec.stop()}catch(e){}rec=null}
  if(pending.trim()){const t=pending.trim();pending='';addTranscription(t,true);addParaphrase(t,simplify(t));fetchTranslation(t);const n=extractNote(t);if(n)addNote(n)}
  rmInterim()
}

// ===== TRANSLATION VIA LIBRETRANSLATE =====
const LM={zh:'zh',en:'en',ja:'ja',ko:'ko'},LN={zh:'中文',en:'English',ja:'日本語',ko:'한국어'}

function fetchTranslation(text){
  const tgt=S.targetLang
  const src=S.sourceLang==='auto'?'auto':(LM[S.sourceLang]||'auto')
  if(src!=='auto'&&src===LM[tgt]){addTranslation('['+LN[tgt]+'] '+text);return}
  fetch('https://libretranslate.com/translate',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({q:text,source:src||'auto',target:LM[tgt]||'zh',format:'text'})
  }).then(r=>r.json()).then(d=>{
    if(d&&d.translatedText)addTranslation(d.translatedText)
    else addTranslation('[待翻译] '+text)
  }).catch(()=>addTranslation('[离线] '+text))
}

// ===== SIMPLIFY =====
const SMAP=[
  [/utilize/gi,'use'],[/implement(?:ed|ing)?/gi,'put in place'],[/subsequent(?:ly)?/gi,'next'],
  [/prior to/gi,'before'],[/demonstrat(?:e|es|ed|ing)/gi,'show'],[/sufficient/gi,'enough'],
  [/approximately/gi,'about'],[/nevertheless/gi,'but'],[/commenc(?:e|es|ed|ing)/gi,'start'],
  [/terminat(?:e|es|ed|ing)/gi,'end'],[/obtain(?:ed|ing)?/gi,'get'],[/purchas(?:e|es|ed|ing)/gi,'buy'],
  [/assistance/gi,'help'],[/regarding/gi,'about'],[/additional/gi,'more'],
  [/significant(?:ly)?/gi,'important'],[/numerous/gi,'many'],[/facilitate/gi,'help with'],
  ['are able to','can'],['is able to','can'],['in order to','to'],
  ['due to the fact that','because'],['at this point in time','now'],
  ['in the event that','if'],['with the exception of','except'],
  [/a multitude of/gi,'many'],[/a majority of/gi,'most'],
]
function simplify(text){let s=text;for(const[p,r]of SMAP)s=s.replace(p,r);return s}

// ===== NOTE EXTRACTION =====
function extractNote(text){
  const words=text.split(/\s+/).filter(w=>w.length>0)
  const kw=[...new Set(words.filter(w=>w.length>2&&w[0]===w[0].toUpperCase()&&w.slice(1)===w.slice(1).toLowerCase()))]
  const nums=words.filter(w=>/\d/.test(w))
  const lines=[]
  if(kw.length>0)lines.push('→ '+kw.join(', '))
  if(nums.length>0)lines.push('  # '+nums.join(', '))
  const l=text.toLowerCase()
  if(/(growth|increase|rise|grew)/.test(l))lines.push('  ↑ 增长')
  if(/(decrease|decline|drop|fell)/.test(l))lines.push('  ↓ 下降')
  if(/(milestone|deadline|november|october|september)/.test(l))lines.push('  ⏰ 里程碑')
  if(/(percent|%)/.test(l))lines.push('  📊 百分比')
  if(/(sg|singapore)/.test(l))lines.push('  🇸🇬 新加坡')
  if(/(vn|vietnam)/.test(l))lines.push('  🇻🇳 越南')
  if(/(cn|china|beijing)/.test(l))lines.push('  🇨🇳 中国')
  if(/(us|usa|united states|america)/.test(l))lines.push('  🇺🇸 美国')
  return lines.join('\n')
}

// ===== AUDIO LEVEL =====
let analyser=null;let rafId=null
function levelLoop(){
  const f=$('lv'),p=$('lp')
  if(f&&analyser){
    const d=new Uint8Array(analyser.frequencyBinCount);analyser.getByteTimeDomainData(d)
    let m=0;for(let i=0;i<d.length;i++){const v=Math.abs(d[i]-128);if(v>m)m=v}
    const pc=Math.min((m/128)*100,100)
    f.style.width=pc+'%';f.style.background=pc<30?'#22c55e':pc<60?'#fbbf24':'#ef4444'
    if(p)p.textContent=Math.round(pc)+'%'
  }
  rafId=requestAnimationFrame(levelLoop)
}

// ===== MIC ACTIONS =====
let audioStream=null;let audioCtx=null

async function handleRecord(){
  if(S.status==='idle'||S.status==='stopped'||S.status==='error'){await startMic()}
  else if(S.status==='recording'){pauseMic()}
  else if(S.status==='paused'){resumeMic()}
}

async function startMic(){
  S.status='requesting';S.error=null;render()
  try{
    const s=await navigator.mediaDevices.getUserMedia({audio:true})
    audioStream=s
    audioCtx=new AudioContext()
    const src=audioCtx.createMediaStreamSource(s)
    const a=audioCtx.createAnalyser();a.fftSize=256;src.connect(a)
    analyser=a
    S.status='recording';render()
    rafId=requestAnimationFrame(levelLoop)
    startSpeechRec()
  }catch(e){S.status='error';S.error='麦克风: '+e.message;render()}
}

function pauseMic(){stopSpeechRec();S.status='paused';render()}
function resumeMic(){S.status='recording';render();startSpeechRec()}

function stopAll(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null}
  analyser=null
  stopSpeechRec()
  if(audioStream){audioStream.getTracks().forEach(t=>t.stop());audioStream=null}
  if(audioCtx){try{audioCtx.close()}catch(e){}audioCtx=null}
  S.status='stopped';render()
}

// ===== EVENTS =====
function bind(){
  $('sl')?.addEventListener('change',e=>{
    S.sourceLang=e.target.value
    if(S.status==='recording'){stopSpeechRec();setTimeout(startSpeechRec,300)}
  })
  $('tl')?.addEventListener('change',e=>{S.targetLang=e.target.value})
  $('br')?.addEventListener('click',handleRecord)
  $('bs')?.addEventListener('click',stopAll)
  $('bd')?.addEventListener('click',loadDemo)
  $('bc')?.addEventListener('click',clearAll)
  $('bt')?.addEventListener('click',()=>{S.theme=S.theme==='dark'?'light':'dark';render()})
}

// ===== DEMO =====
function loadDemo(){
  if(S.status==='recording')stopAll()
  clearAll()
  const LN2={zh:'中文',en:'English',ja:'日本語',ko:'한국어'}
  const demos=[
    'Good morning everyone, today I will share the Q3 international expansion strategy.',
    'We achieved 18 percent growth in Southeast Asia, with Singapore and Vietnam leading the pipeline.',
    'Our next milestone is to localize customer support before November 15.',
  ]
  demos.forEach((t,i)=>setTimeout(()=>{
    addTranscription(t,true)
    addParaphrase(t,simplify(t))
    fetchTranslation(t)
    const n=extractNote(t);if(n)addNote(n)
  },i*500))
}

function clearAll(){clearPanels();S.error=null;render()}

// ===== BOOT =====
document.addEventListener('DOMContentLoaded',()=>render())
</script>
